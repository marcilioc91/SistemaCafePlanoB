<div class="home-container">
  <h2 class="home-titulo">O que deseja fazer?</h2>

  <div class="home-cards">

    <mat-card class="home-card" (click)="irParaCadastroCliente()">
      <mat-card-content>
        <mat-icon class="home-icon">person_add</mat-icon>
        <h3>Cadastro de Cliente</h3>
        <p>Registrar um novo cliente no sistema</p>
      </mat-card-content>
    </mat-card>

    <mat-card class="home-card" (click)="irParaCadastroProduto()">
      <mat-card-content>
        <mat-icon class="home-icon">add_box</mat-icon>
        <h3>Cadastro de Produto</h3>
        <p>Adicionar um novo produto ao catálogo</p>
      </mat-card-content>
    </mat-card>

  </div>
</div>
