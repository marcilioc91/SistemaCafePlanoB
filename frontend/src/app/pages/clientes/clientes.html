<div class="clientes-container">
  <div class="clientes-header">
    <h2>Clientes</h2>
    <div class="header-acoes">
      <button mat-raised-button color="primary" (click)="abrirFormulario()">
        <mat-icon>person_add</mat-icon>
        Adicionar Cliente
      </button>
      <button mat-stroked-button routerLink="/home">
        <mat-icon>arrow_back</mat-icon>
        Voltar
      </button>
    </div>
  </div>

  <mat-form-field appearance="outline" class="campo-busca">
    <mat-label>Buscar por nome</mat-label>
    <input matInput [formControl]="filtroCtrl" [matAutocomplete]="auto" placeholder="Digite para buscar...">
    <mat-icon matSuffix>search</mat-icon>
    <mat-autocomplete #auto="matAutocomplete">
      @for (nome of nomesFiltrados; track nome) {
        <mat-option [value]="nome">{{ nome }}</mat-option>
      }
    </mat-autocomplete>
  </mat-form-field>

  <table mat-table matSort matSortActive="nome" matSortDirection="asc"
         [dataSource]="dataSource" class="clientes-tabela mat-elevation-z2">

    <ng-container matColumnDef="nome">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Nome</th>
      <td mat-cell *matCellDef="let c" class="uppercase">{{ c.pessoa.nome }}</td>
    </ng-container>

    <ng-container matColumnDef="telefone">
      <th mat-header-cell *matHeaderCellDef>Telefone</th>
      <td mat-cell *matCellDef="let c">{{ formatarTelefone(c.pessoa.telefone) || '—' }}</td>
    </ng-container>

    <ng-container matColumnDef="obs">
      <th mat-header-cell *matHeaderCellDef>Observações</th>
      <td mat-cell *matCellDef="let c">{{ c.obs || '—' }}</td>
    </ng-container>

    <ng-container matColumnDef="acoes">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let c">
        <button mat-icon-button color="primary" (click)="verCompras(c)" title="Ver compras">
          <mat-icon>shopping_bag</mat-icon>
        </button>
        <button mat-icon-button (click)="abrirEdicao(c)" title="Editar">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button (click)="excluir(c)" title="Excluir">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="colunas"></tr>
    <tr mat-row *matRowDef="let row; columns: colunas;"></tr>
    <tr class="mat-row" *matNoDataRow>
      <td class="mat-cell sem-dados" [attr.colspan]="colunas.length">
        {{ filtroCtrl.value ? 'Nenhum cliente encontrado.' : 'Nenhum cliente cadastrado.' }}
      </td>
    </tr>
  </table>

  <mat-paginator [pageSize]="10" [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons></mat-paginator>
</div>
