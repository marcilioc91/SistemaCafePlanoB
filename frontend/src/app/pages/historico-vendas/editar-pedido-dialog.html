<div class="editar-pedido-container">
    <h3 mat-dialog-title>Editar Itens da Venda #{{data.venda.id}}</h3>

    <mat-dialog-content>
        <table mat-table [dataSource]="itensEdicao">

            <ng-container matColumnDef="produto">
                <th mat-header-cell *matHeaderCellDef>Produto</th>
                <td mat-cell *matCellDef="let i">
                    <mat-form-field appearance="outline" style="width: 250px;">
                        <input type="text" matInput [matAutocomplete]="auto" [(ngModel)]="i.produto.nome"
                            (input)="filtrarProdutos(i)">

                        <mat-autocomplete #auto="matAutocomplete"
                            (optionSelected)="selecionarProduto(i, $event.option.value)">
                            @for (p of produtosFiltrados; track p.id) {
                            <mat-option [value]="p">{{ p.nome }}</mat-option>
                            }
                        </mat-autocomplete>
                    </mat-form-field>
                </td>
            </ng-container>

            <ng-container matColumnDef="quantidade">
                <th mat-header-cell *matHeaderCellDef>Qtd</th>
                <td mat-cell *matCellDef="let i">
                    <input type="number" [(ngModel)]="i.quantidade" min="1" style="width: 50px;">
                </td>
            </ng-container>

            <ng-container matColumnDef="preco">
                <th mat-header-cell *matHeaderCellDef>Preço</th>
                <td mat-cell *matCellDef="let i">R$ {{i.precoUnitario | number:'1.2-2'}}</td>
            </ng-container>

            <ng-container matColumnDef="acoes">
                <th mat-header-cell *matHeaderCellDef>Excluir</th>
                <td mat-cell *matCellDef="let i">
                    <button mat-icon-button color="warn" (click)="remover(i)">
                        <mat-icon>delete</mat-icon>
                    </button>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="['produto', 'quantidade', 'preco', 'acoes']"></tr>
            <tr mat-row *matRowDef="let row; columns: ['produto', 'quantidade', 'preco', 'acoes'];"></tr>
        </table>

        <div style="margin-top: 15px; text-align: right; font-weight: bold;">
            Novo Total: R$ {{calcularNovoTotal() | number:'1.2-2'}}
        </div>
    </mat-dialog-content>
    <mat-dialog-actions align="end">
        <button mat-button (click)="cancelar()">Cancelar</button>
        <button mat-raised-button color="primary" (click)="salvar()" [disabled]="itensEdicao.length === 0">
            Salvar Alterações
        </button>
    </mat-dialog-actions>
</div>
