<h2 style="padding: 24px 24px 0">Quitar Pendências</h2>

<div style="padding: 0 24px 24px; min-width: 360px;">
  <p class="uppercase" style="font-weight:600; margin-bottom: 4px;">{{ data.nomeCliente }}</p>
  <p style="color:#555; margin-bottom:16px">
    Total pendente: <strong>R$ {{ data.totalPendente | number:'1.2-2' }}</strong>
  </p>

  <mat-form-field style="width:100%">
    <mat-label>Forma de pagamento</mat-label>
    <mat-select [(ngModel)]="formaPagamento" name="forma">
      @for (f of formas; track f.valor) {
        <mat-option [value]="f.valor">{{ f.label }}</mat-option>
      }
    </mat-select>
  </mat-form-field>

  @if (erro) {
    <p style="color:red; font-size:0.85rem">{{ erro }}</p>
  }

  <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:12px;">
    <button mat-button (click)="cancelar()">Cancelar</button>
    <button mat-raised-button color="primary" [disabled]="!formaPagamento" (click)="confirmar()">
      Confirmar Pagamento
    </button>
  </div>
</div>
