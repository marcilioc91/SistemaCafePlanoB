<div class="produtos-container">
  <div class="produtos-header">
    <h2>Produtos</h2>
    <div class="header-acoes">
      <button mat-raised-button color="primary" (click)="abrirFormulario()">
        <mat-icon>add</mat-icon>
        Novo Produto
      </button>
      <button mat-stroked-button routerLink="/home">
        <mat-icon>arrow_back</mat-icon>
        Voltar
      </button>
    </div>
  </div>

  @if (produtos.length === 0) {
  <p class="sem-dados">Nenhum produto cadastrado.</p>
  } @else {
  <table mat-table [dataSource]="produtos" class="produtos-tabela mat-elevation-z2">

    <ng-container matColumnDef="semEstoque">
      <th mat-header-cell *matHeaderCellDef title="Sem estoque">S/ Estoque</th>
      <td mat-cell *matCellDef="let p">
        <mat-checkbox [checked]="p.estoque === 0" [disabled]="p.estoque === 0"
          (change)="marcarSemEstoque(p, $event.checked)" title="Marcar como sem estoque">
        </mat-checkbox>
      </td>
    </ng-container>

    <ng-container matColumnDef="nome">
      <th mat-header-cell *matHeaderCellDef>Produto</th>
      <td mat-cell *matCellDef="let p" class="uppercase">{{ p.nome }}</td>
    </ng-container>

    <ng-container matColumnDef="preco">
      <th mat-header-cell *matHeaderCellDef>Preço</th>
      <td mat-cell *matCellDef="let p">R$ {{ p.preco | number:'1.2-2' }}</td>
    </ng-container>

    <ng-container matColumnDef="estoque">
      <th mat-header-cell *matHeaderCellDef>Estoque</th>
      <td mat-cell *matCellDef="let p">
        <span [class.estoque-zero]="p.estoque === 0" [class.estoque-baixo]="p.estoque > 0 && p.estoque <= 5">
          {{ p.estoque }} un.
        </span>
      </td>
    </ng-container>

    <ng-container matColumnDef="acoes">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let p">
        <button mat-icon-button (click)="abrirEdicao(p)" title="Editar">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="excluir(p)" title="Excluir">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="colunas"></tr>
    <tr mat-row *matRowDef="let row; columns: colunas;"></tr>
  </table>
  }
</div>
