<div class="login-container">

    <h2>Bem-vindo!</h2>

    <form class="login-form">

        <mat-form-field class="full-width">
            <mat-label>Usuário</mat-label>
            <input matInput [(ngModel)]="conta.login" name="login" type="text">
        </mat-form-field>

        <mat-form-field class="full-width">
            <mat-label>Senha</mat-label>

            <input matInput [(ngModel)]="conta.senha" name="senha" [type]="hide ? 'password' : 'text'">

            <button mat-icon-button matSuffix type="button" (click)="togglePassword()"
                [attr.aria-label]="'Mostrar ou ocultar senha'" [attr.aria-pressed]="hide">
                <mat-icon>{{ hide ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
        </mat-form-field>

        <button mat-raised-button color="primary" class="full-width" (click)="login()"
            [disabled]="!conta.login || !conta.senha">
            Entrar
        </button>

        <p>Primeiro acesso? <a class="cadastro-link" (click)="abrirCadastro()" style="cursor: pointer;">Clique aqui!</a></p>
    </form>


</div>
